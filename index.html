<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日蛋糕定制 | 精选蛋糕展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e8b4b8;
            --secondary: #f5e6e8;
            --text: #5a4a4a;
            --accent: #d4a574;
            --white: #ffffff;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #fdf6f7 0%, #f5e6e8 100%);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: var(--white);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(232, 180, 184, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--white);
        }

        .hero h1 {
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #8a7a7a;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: var(--white);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(232, 180, 184, 0.4);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 180, 184, 0.6);
        }

        /* Gallery */
        .gallery {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 3rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--primary);
            margin: 1rem auto 0;
        }

        .cake-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .cake-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(232, 180, 184, 0.15);
            transition: all 0.3s;
        }

        .cake-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(232, 180, 184, 0.3);
        }

        .cake-image {
            width: 100%;
            height: 250px;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .cake-info {
            padding: 1.5rem;
        }

        .cake-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .cake-desc {
            color: #8a7a7a;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .cake-price {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: bold;
        }

        .select-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .select-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        /* Contact */
        .contact {
            background: var(--white);
            padding: 4rem 2rem;
        }

        .contact-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-form input,
        .contact-form textarea,
        .contact-form select {
            padding: 1rem;
            border: 2px solid var(--secondary);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }

        .contact-form input:focus,
        .contact-form textarea:focus,
        .contact-form select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .contact-form button {
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .contact-form button:hover {
            background: #d9a0a5;
        }

        /* Footer */
        footer {
            background: var(--text);
            color: var(--white);
            text-align: center;
            padding: 2rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8a7a7a;
        }

        .selected-cakes {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--secondary);
            border-radius: 10px;
        }

        .selected-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--primary);
        }

        /* WeChat QR placeholder */
        .wechat-qr {
            text-align: center;
            margin-top: 2rem;
            padding: 2rem;
            background: var(--secondary);
            border-radius: 15px;
        }

        .wechat-qr p {
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8rem;
            }
            
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            nav a {
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🎂 甜蜜蛋糕</div>
            <nav>
                <a href="#gallery">蛋糕展示</a>
                <a href="#contact">联系我们</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h1>定制专属生日蛋糕</h1>
        <p>精选食材，匠心制作<br>让每一口都成为甜蜜回忆</p>
        <a href="#gallery" class="cta-button">开始选蛋糕</a>
    </section>

    <section id="gallery" class="gallery">
        <h2 class="section-title">蛋糕展示</h2>
        <div class="cake-grid" id="cakeGrid">
            <!-- 蛋糕卡片将通过JS动态生成 -->
        </div>
    </section>

    <section id="contact" class="contact">
        <h2 class="section-title">联系我们</h2>
        <div class="contact-content">
            <p style="text-align: center; margin-bottom: 2rem; color: #8a7a7a;">
                选择您喜欢的蛋糕，提交订单，我们将尽快与您联系确认
            </p>
            <form class="contact-form" id="orderForm">
                <input type="text" name="name" placeholder="您的姓名" required>
                <input type="tel" name="phone" placeholder="联系电话" required>
                <input type="text" name="wechat" placeholder="微信号（选填）">
                <textarea name="message" rows="4" placeholder="备注信息（如：生日日期、庆祝人数等）"></textarea>
                <button type="submit">提交订单</button>
            </form>
            <div class="wechat-qr">
                <p>📱 扫码添加微信咨询</p>
                <div style="width: 150px; height: 150px; background: #fff; margin: 0 auto; display: flex; align-items: center; justify-content: center; border-radius: 10px;">
                    <span style="color: #8a7a7a;">[微信二维码]</span>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>🎂 甜蜜蛋糕 | 用心定制每一份甜蜜</p>
        <p style="font-size: 0.9rem; margin-top: 0.5rem; opacity: 0.7;">© 2026 All Rights Reserved</p>
    </footer>

    <!-- 选蛋糕确认弹窗 -->
    <div class="modal" id="cakeModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h3 style="margin-bottom: 1rem;">已选蛋糕</h3>
            <div class="selected-cakes" id="selectedCakes">
                <p style="color: #8a7a7a;">暂无选择</p>
            </div>
            <button class="select-btn" onclick="closeModal()">继续选蛋糕</button>
        </div>
    </div>

    <script>
        // 蛋糕数据（稍后替换为真实图片和价格）
        const cakes = [
            {
                id: 1,
                name: '经典奶油蛋糕',
                description: '新鲜奶油搭配水果夹心，简约却不简单',
                price: 188,
                emoji: '🎂'
            },
            {
                id: 2,
                name: '巧克力慕斯',
                description: '浓郁黑巧克力慕斯，甜而不腻',
                price: 228,
                emoji: '🍫'
            },
            {
                id: 3,
                name: '草莓鲜奶蛋糕',
                description: '新鲜草莓点缀，酸甜可口',
                price: 218,
                emoji: '🍓'
            },
            {
                id: 4,
                name: '芝士熔岩蛋糕',
                description: '浓郁芝士内陷，入口即化',
                price: 258,
                emoji: '🧀'
            },
            {
                id: 5,
                name: '抹茶红豆蛋糕',
                description: '日式抹茶风味，清新回甘',
                price: 238,
                emoji: '🍵'
            },
            {
                id: 6,
                name: '水果派对蛋糕',
                description: '多种新鲜水果，缤纷美味',
                price: 268,
                emoji: '🥭'
            }
        ];

        // 已选蛋糕
        let selectedCakes = [];

        // 渲染蛋糕卡片
        function renderCakes() {
            const grid = document.getElementById('cakeGrid');
            grid.innerHTML = cakes.map(cake => `
                <div class="cake-card">
                    <div class="cake-image">${cake.emoji}</div>
                    <div class="cake-info">
                        <div class="cake-name">${cake.name}</div>
                        <div class="cake-desc">${cake.description}</div>
                        <div class="cake-price">¥${cake.price}</div>
                        <button class="select-btn" onclick="selectCake(${cake.id})">加入选择</button>
                    </div>
                </div>
            `).join('');
        }

        // 选择蛋糕
        function selectCake(id) {
            const cake = cakes.find(c => c.id === id);
            if (!selectedCakes.find(c => c.id === id)) {
                selectedCakes.push(cake);
                alert(`已添加：${cake.name}`);
            } else {
                alert('这款蛋糕已经选过了~');
            }
            updateSelectedDisplay();
        }

        // 更新已选显示
        function updateSelectedDisplay() {
            const display = document.getElementById('selectedCakes');
            if (selectedCakes.length === 0) {
                display.innerHTML = '<p style="color: #8a7a7a;">暂无选择</p>';
            } else {
                display.innerHTML = selectedCakes.map(cake => `
                    <div class="selected-item">
                        <span>${cake.emoji} ${cake.name}</span>
                        <span>¥${cake.price}</span>
                    </div>
                `).join('');
            }
        }

        // 弹窗
        function closeModal() {
            document.getElementById('cakeModal').classList.remove('active');
        }

        // 表单提交
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (selectedCakes.length === 0) {
                alert('请先选择至少一款蛋糕~');
                return;
            }

            const formData = new FormData(this);
            const data = {
                name: formData.get('name'),
                phone: formData.get('phone'),
                wechat: formData.get('wechat'),
                message: formData.get('message'),
                cakes: selectedCakes
            };

            // 这里可以添加发送通知的逻辑
            alert('订单提交成功！我们将尽快联系您~');
            console.log('订单数据:', data);
            
            // 清空选择
            selectedCakes = [];
            updateSelectedDisplay();
            this.reset();
        });

        // 初始化
        renderCakes();
    </script>
</body>
</html>
